name: Multi-Arch Build - Master

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      VERSION:
        description: "Optional version tag to override AirConnect release version"
        required: false
        default: ""

jobs:
  build-master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup qemu
        uses: docker/setup-qemu-action@v3

      - name: Setup buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build env
        id: prepare
        run: |
          DOCKER_IMAGE=airconnect
          PLATFORMS=("linux/amd64" "linux/arm64")
          VERSION="${{ github.event.inputs.VERSION }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/philippe44/AirConnect/releases/latest | grep tag_name | cut -d '"' -f 4)
          fi

          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "platforms=${PLATFORMS[*]}" >> $GITHUB_OUTPUT

      - name: Build each architecture & export tar
        if: github.event_name != 'pull_request'
        run: |
          IMG=${{ steps.prepare.outputs.docker_image }}
          VER=${{ steps.prepare.outputs.version }}
          PLATFORMS=(${{ steps.prepare.outputs.platforms }})
          for plat in "${PLATFORMS[@]}"; do
            arch=${plat#linux/}
            echo "===== Building $plat ====="
            docker buildx build \
              --platform ${plat} \
              --build-arg VERSION=${VER} \
              --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
              --build-arg VCS_REF=${GITHUB_SHA::8} \
              --tag ${IMG}:${VER}-${arch} \
              --output type=image \
              -f ./Dockerfile ./
            echo "===== Export airconnect-${VER}-${arch}.tar ====="
            docker save ${IMG}:${VER}-${arch} -o airconnect-${VER}-${arch}.tar
          done

      - name: List local built images
        if: github.event_name != 'pull_request'
        run: docker images ${{ steps.prepare.outputs.docker_image }}

      - name: Upload all architecture tar packages
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: airconnect-docker-images
          path: airconnect-*.tar
