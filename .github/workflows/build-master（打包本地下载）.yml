name: Multi-Arch Build - Master（打包本地下载）

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      VERSION:
        description: "Optional version tag to override AirConnect release version"
        required: false
        default: ""

jobs:
  build-master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup qemu
        uses: docker/setup-qemu-action@v3

      - name: Setup buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build and tags
        id: prepare
        run: |
          DOCKER_IMAGE=1activegeek/airconnect
          DOCKER_PLATFORMS=linux/amd64,linux/arm64
          # linux/arm/v7 removed as deprecated by ls.io
          VERSION="${{ github.event.inputs.VERSION }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/philippe44/AirConnect/releases/latest | grep tag_name | cut -d '"' -f 4)
          fi

          TAGS="--tag ${DOCKER_IMAGE}:${VERSION} --tag ${DOCKER_IMAGE}:latest"
          
          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "buildx_args=--platform ${DOCKER_PLATFORMS} \
            --build-arg VERSION=${VERSION} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${GITHUB_SHA::8} \
            ${TAGS} --file ./Dockerfile ./" >> $GITHUB_OUTPUT

      # 已删除：Login to DockerHub 登录推送步骤

      - name: Build Local Image Only (No Push)
        if: github.event_name != 'pull_request'
        run: |
          # 去掉 push=true，仅构建保存在本地runner，不上传仓库
          docker buildx build --output "type=image" ${{ steps.prepare.outputs.buildx_args }}

      - name: Inspect Local Image
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools inspect ${{ steps.prepare.outputs.docker_image }}:${{ steps.prepare.outputs.version }}

      # 新增：导出镜像为制品，方便自行下载使用
      - name: Export Docker Image Tar
        if: github.event_name != 'pull_request'
        run: |
          docker save ${{ steps.prepare.outputs.docker_image }}:${{ steps.prepare.outputs.version }} -o airconnect-${{ steps.prepare.outputs.version }}.tar

      - name: Upload Image Artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: airconnect-docker-image
          path: airconnect-*.tar
