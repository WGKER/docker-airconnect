name: Multi-Arch Build - Master（打包本地下载）

on:
#  schedule:
#    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      VERSION:
        description: "Optional version tag to override AirConnect release version"
        required: false
        default: ""

jobs:
  # 矩阵拆分两个架构，并行执行，互不干扰
  build-per-arch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 一个架构失败不阻断另一个构建
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup qemu
        uses: docker/setup-qemu-action@v3

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build env
        id: prepare
        run: |
          DOCKER_IMAGE=airconnect-web
          VERSION="${{ github.event.inputs.VERSION }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/philippe44/AirConnect/releases/latest | grep tag_name | cut -d '"' -f 4)
          fi

          arch=${{ matrix.platform }}
          arch_safe=${arch//\//_}
          tag="${DOCKER_IMAGE}:${VERSION}-${arch_safe}"
          tar_name="airconnect-web-${VERSION}-${arch_safe}.tar"

          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "arch_safe=${arch_safe}" >> $GITHUB_OUTPUT
          echo "tag=${tag}" >> $GITHUB_OUTPUT
          echo "tar_name=${tar_name}" >> $GITHUB_OUTPUT

      - name: Build single arch image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg VERSION=${{ steps.prepare.outputs.version }} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${GITHUB_SHA::8} \
            --tag ${{ steps.prepare.outputs.tag }} \
            --output type=docker \
            -f ./Dockerfile ./

      - name: Export tar archive
        run: |
          docker save ${{ steps.prepare.outputs.tag }} -o ${{ steps.prepare.outputs.tar_name }}

      - name: List local images
        run: docker images ${{ steps.prepare.outputs.docker_image }}

      # 每个架构单独上传独立Artifact
      - name: Upload separate artifact
        uses: actions/upload-artifact@v4
        with:
          # 制品名称带架构区分，两个完全独立
          name: airconnect-web-${{ steps.prepare.outputs.version }}-${{ steps.prepare.outputs.arch_safe }}
          path: ${{ steps.prepare.outputs.tar_name }}
